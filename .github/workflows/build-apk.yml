name: Build PRPR APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          
      - name: Install cargo-apk
        run: cargo install cargo-apk --locked
        
      - name: Build APK
        run: cargo apk build --release --bin prpr-client-main
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prpr-apk
          path: target/aarch64-linux-android/release/apk/prpr-client-main.apk
