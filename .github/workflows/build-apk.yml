name: Build PRPR APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          
     - name: Setup Android
  uses: android-actions/setup-android@v3
  with:
    packages: 'cmdline-tools;latest,build-tools;33.0.2,ndk;25.2.9519653,android-33'
          
      - name: Install cargo-apk
        run: cargo install cargo-apk --locked
          
      - name: Build APK
        run: |
          cd prpr-client-main
          cargo apk build --release --bin prpr-client-main
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prpr-apk
          path: prpr-client-main/target/aarch64-linux-android/release/apk/prpr-client-main.apk
